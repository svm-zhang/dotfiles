---
- name: Check macOS terminal casks before install
  ansible.builtin.command:
    cmd: "brew list --cask --versions {{ item }}"
  loop: "{{ macos_terminal_casks }}"
  register: terminal_macos_cask_precheck
  changed_when: false
  failed_when: false
  when: terminal_app == "ghostty"

- name: Set missing macOS terminal casks
  ansible.builtin.set_fact:
    terminal_macos_missing_casks: >-
      {{
        terminal_macos_cask_precheck.results
        | selectattr('rc', 'ne', 0)
        | map(attribute='item')
        | list
      }}
  when: terminal_app == "ghostty"

- name: Install macOS Ghostty cask
  ansible.builtin.command:
    cmd: "brew install --cask {{ item }}"
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_INSTALL_CLEANUP: "1"
  loop: "{{ terminal_macos_missing_casks | default(macos_terminal_casks) }}"
  register: terminal_macos_cask_install
  changed_when: true
  when:
    - terminal_app == "ghostty"
    - (terminal_macos_missing_casks | default(macos_terminal_casks)) | length > 0

- name: Verify macOS Ghostty cask is installed
  ansible.builtin.command:
    cmd: "brew list --cask --versions {{ item }}"
  loop: "{{ macos_terminal_casks }}"
  changed_when: false
  when: terminal_app == "ghostty"

- name: Verify macOS Ghostty CLI actions
  ansible.builtin.command:
    argv:
      - ghostty
      - "{{ item }}"
  loop:
    - +version
    - +help
  changed_when: false
  when: terminal_app == "ghostty"
