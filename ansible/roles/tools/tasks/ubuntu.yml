---
- name: Include Ubuntu tools precheck
  ansible.builtin.include_tasks: ubuntu_precheck.yml

- name: Install Ubuntu apt-owned tool packages
  ansible.builtin.apt:
    name: "{{ tools_ubuntu_missing_apt_packages | default(ubuntu_apt_packages) }}"
    state: present
    update_cache: true
  become: true
  when: (tools_ubuntu_missing_apt_packages | default(ubuntu_apt_packages)) | length > 0

- name: Check Linuxbrew default brew path
  ansible.builtin.stat:
    path: "{{ linuxbrew_default_bin }}"
  register: linuxbrew_default_bin_stat

- name: Install Linuxbrew
  ansible.builtin.shell:
    cmd: |
      set -eu
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    executable: /bin/bash
  when: not linuxbrew_default_bin_stat.stat.exists

- name: Check Linuxbrew after install
  ansible.builtin.stat:
    path: "{{ linuxbrew_default_bin }}"
  register: tools_linuxbrew_brew_after_install_stat

- name: Set Linuxbrew command path
  ansible.builtin.set_fact:
    tools_brew_bin: "{{ linuxbrew_default_bin }}"
  when: tools_linuxbrew_brew_after_install_stat.stat.exists

- name: Validate Linuxbrew command path
  ansible.builtin.assert:
    that:
      - tools_brew_bin | length > 0
    fail_msg: "Linuxbrew brew command was not found after installation."

- name: Debug linuxbrew bin location
  ansible.builtin.debug:
    msg: "{{ tools_brew_bin }}"

- name: Check Ubuntu Linuxbrew formulae before install
  ansible.builtin.command:
    cmd: "{{ tools_brew_bin }} list --versions {{ item.key }}"
  loop: "{{ ubuntu_tools_formulae | dict2items }}"
  register: tools_linuxbrew_formula_precheck
  changed_when: false
  failed_when: false

- name: Set missing Ubuntu Linuxbrew formulae
  ansible.builtin.set_fact:
    tools_linuxbrew_missing_formulae: >-
      {{
        tools_linuxbrew_formula_precheck.results
        | selectattr('rc', 'ne', 0)
        | map(attribute='item.key')
        | list
      }}

- name: Install Ubuntu Linuxbrew formulae
  ansible.builtin.command:
    cmd: "{{ tools_brew_bin }} install {{ item }}"
  environment:
    HOMEBREW_NO_AUTO_UPDATE: "1"
    HOMEBREW_NO_INSTALL_CLEANUP: "1"
  loop: "{{ tools_linuxbrew_missing_formulae | default(ubuntu_tools_formulae.keys() | list) }}"
  register: tools_linuxbrew_install
  changed_when: true
  when: (tools_linuxbrew_missing_formulae | default(ubuntu_tools_formulae.keys() | list)) | length > 0

- name: Verify Ubuntu Linuxbrew formulae are installed
  ansible.builtin.command:
    cmd: "{{ tools_brew_bin }} list --versions {{ item.key }}"
  loop: "{{ ubuntu_tools_formulae | dict2items }}"
  changed_when: false

- name: Get Ubuntu rustup Linuxbrew prefix
  ansible.builtin.command:
    cmd: "{{ tools_brew_bin }} --prefix rustup"
  register: tools_ubuntu_rustup_prefix
  changed_when: false

- name: Install Ubuntu Rust stable toolchain
  ansible.builtin.command:
    argv:
      - "{{ tools_ubuntu_rustup_prefix.stdout }}/bin/rustup"
      - default
      - stable
  register: tools_ubuntu_rustup_default
  changed_when: "'unchanged' not in ((tools_ubuntu_rustup_default.stdout | default('')) ~ (tools_ubuntu_rustup_default.stderr | default('')))"

- name: Verify Ubuntu Rust tools are available through rustup
  ansible.builtin.command:
    argv:
      - "{{ tools_ubuntu_rustup_prefix.stdout }}/bin/{{ item }}"
      - --version
  loop:
    - cargo
    - rustc
  changed_when: false

- name: Get Ubuntu uv Linuxbrew prefix
  ansible.builtin.command:
    cmd: "{{ tools_brew_bin }} --prefix uv"
  register: tools_ubuntu_uv_prefix
  changed_when: false

- name: Install Ubuntu uv-managed Python
  ansible.builtin.command:
    argv:
      - "{{ tools_ubuntu_uv_prefix.stdout }}/bin/uv"
      - python
      - install
      - "{{ tools_uv_python_version }}"
  register: tools_ubuntu_uv_python_install
  changed_when: >-
    'already installed' not in
    ((tools_ubuntu_uv_python_install.stdout | default('')) ~
    (tools_ubuntu_uv_python_install.stderr | default('')))

- name: Verify Ubuntu uv-managed Python
  ansible.builtin.command:
    argv:
      - "{{ tools_ubuntu_uv_prefix.stdout }}/bin/uv"
      - python
      - find
      - "{{ tools_uv_python_version }}"
  changed_when: false
