---
- name: Validate global deploy mode
  ansible.builtin.assert:
    that:
      - deploy_mode in ["render", "docker", "home"]
    fail_msg: "deploy_mode must be one of: render, docker, home"

- name: Include Ubuntu tools tasks
  ansible.builtin.include_tasks: ubuntu.yml
  when:
    - allow_package_changes | bool
    - ansible_facts['distribution'] == "Ubuntu"

- name: Include macOS tools tasks
  ansible.builtin.include_tasks: macos.yml
  when:
    - allow_package_changes | bool
    - ansible_facts['system'] == "Darwin"
