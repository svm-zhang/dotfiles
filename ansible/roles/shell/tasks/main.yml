---
- name: Validate shell deploy mode
  ansible.builtin.assert:
    that:
      - shell_deploy_mode in ["test", "home"]
    fail_msg: "shell_deploy_mode must be one of: test, home"

- name: Create shell target directory
  ansible.builtin.file:
    path: "{{ shell_target_root }}"
    state: directory
    mode: "0700"

- name: Render shell files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ shell_target_root }}/{{ item.dest }}"
    mode: "0644"
  loop:
    - src: bashrc.j2
      dest: "{{ shell_bashrc_file }}"
    - src: bash_aliases.j2
      dest: "{{ shell_aliases_file }}"
    - src: bash_exports.j2
      dest: "{{ shell_exports_file }}"
    - src: functionsrc.j2
      dest: "{{ shell_functions_file }}"
