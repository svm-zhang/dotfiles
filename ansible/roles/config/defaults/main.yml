---
config_target_user_home: "{{ (dot_render_root ~ '/config') if mode_render else dot_user_home }}"
config_target_root: "{{ config_target_user_home }}/{{ dot_xdg_config_dir }}"
config_xdg_config_home: "{{ config_target_root }}"

config_template_files:
  - src: fzfrc.j2
    dest: "{{ config_target_user_home }}/.fzfrc"
  - src: bat-config.j2
    dest: "{{ config_xdg_config_home }}/bat/config"
  - src: diffnav-config.yml.j2
    dest: "{{ config_xdg_config_home }}/diffnav/config.yml"
  - src: glow.yml.j2
    dest: "{{ config_xdg_config_home }}/glow/glow.yml"
  - src: ghostty-config.j2
    dest: "{{ config_ghostty_config_dir }}/config"
  - src: ghostty-local-theme.conf.j2
    dest: "{{ config_ghostty_local_dir }}/theme.conf"
  - src: ghostty-local-fonts.conf.j2
    dest: "{{ config_ghostty_local_dir }}/fonts.conf"

config_directories:
  - "{{ config_xdg_config_home }}/bat"
  - "{{ config_xdg_config_home }}/bat/themes"
  - "{{ config_xdg_config_home }}/diffnav"
  - "{{ config_xdg_config_home }}/glow"
  - "{{ config_xdg_config_home }}/glow/styles"
  - "{{ config_xdg_config_home }}/oh-my-posh/themes"
  - "{{ config_ghostty_config_dir }}"
  - "{{ config_ghostty_profiles_dir }}"
  - "{{ config_ghostty_local_dir }}"

config_ghostty_config_dir: "{{ config_xdg_config_home }}/ghostty"
config_ghostty_profiles_dir: "{{ config_ghostty_config_dir }}/profiles"
config_ghostty_local_dir: "{{ config_ghostty_config_dir }}/local"

config_ghostty_profile_files:
  - font-anthrosevka-mono.conf
  - font-liga-paper-mono.conf
  - font-iosevka-term.conf
  - theme-catppuccin-mocha.conf
  - theme-catppuccin-macchiato.conf
  - theme-tokyonight.conf
  - theme-dracula.conf
