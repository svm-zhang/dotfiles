---
- name: Dotfiles deployment
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Validate deployment inputs
      ansible.builtin.include_tasks: tasks/validate.yml

  roles:
    - tools
    - docker
    - gpu
    - shell
    - fonts
    - config
    - terminal
    - git
    - github_ssh
    - tmux
    - neovim
    - document
    - clipboard
