---
dotfiles_project_state: skeleton
dotfiles_target_profiles: []
dotfiles_manage_dotfiles: false
dotfiles_manage_packages: false
dotfiles_manage_secrets: false
dotfiles_enable_nvidia_gpu: false

dot_xdg_config_dir: ".config"
dot_theme: "macchiato"

dot_theme_assets:
  bat:
    macchiato: "catppuccin_macchiato.tmTheme"
    tokyonight: "tokyonight.tmTheme"
    dracula: "dracula.tmTheme"
  glow:
    macchiato: "macchiato.glow.json"
    tokyonight: "tokyonight.glow.json"
    dracula: "dracula.glow.json"
  omp:
    macchiato: "macchiato.omp.json"
    tokyonight: "tokyonight.omp.json"
    dracula: "dracula.omp.json"

dot_theme_catalog:
  macchiato:
    bat_theme_name: "catppuccin_macchiato"
    bat_theme_file: "{{ dot_theme_assets.bat.macchiato }}"
    glow_style_file: "{{ dot_theme_assets.glow.macchiato }}"
    jqp_theme_name: "catppuccin-macchiato"
    omp_theme_file: "{{ dot_theme_assets.omp.macchiato }}"
  tokyonight:
    bat_theme_name: "tokyonight"
    bat_theme_file: "{{ dot_theme_assets.bat.tokyonight }}"
    glow_style_file: "{{ dot_theme_assets.glow.tokyonight }}"
    jqp_theme_name: "tokyonight"
    omp_theme_file: "{{ dot_theme_assets.omp.tokyonight }}"
  dracula:
    bat_theme_name: "dracula"
    bat_theme_file: "{{ dot_theme_assets.bat.dracula }}"
    glow_style_file: "{{ dot_theme_assets.glow.dracula }}"
    jqp_theme_name: "dracula"
    omp_theme_file: "{{ dot_theme_assets.omp.dracula }}"

dot_active_theme: "{{ dot_theme_catalog[dot_theme] }}"
dot_bat_theme_name: "{{ dot_active_theme.bat_theme_name }}"
dot_bat_theme_file: "{{ dot_active_theme.bat_theme_file }}"
dot_glow_style_file: "{{ dot_active_theme.glow_style_file }}"
dot_jqp_theme_name: "{{ dot_active_theme.jqp_theme_name }}"
dot_omp_theme_file: "{{ dot_active_theme.omp_theme_file }}"
