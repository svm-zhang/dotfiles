name: Ansible Migration

on:
  workflow_dispatch:

jobs:
  ubuntu-tools-install:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create CI inventory vault replacement
        run: |
          mkdir -p ansible/inventory-ci/group_vars/all
          cp ansible/inventory/docker.yml ansible/inventory-ci/docker.yml
          cp -R ansible/inventory/group_vars/macos ansible/inventory-ci/group_vars/
          cp -R ansible/inventory/group_vars/ubuntu ansible/inventory-ci/group_vars/
          cp -R ansible/inventory/group_vars/docker ansible/inventory-ci/group_vars/
          cp ansible/inventory/group_vars/all/main.yml ansible/inventory-ci/group_vars/all/main.yml
          cat > ansible/inventory-ci/group_vars/all/vault.yml <<'YAML'
          git_user_name: "CI Test User"
          git_user_email: "ci@example.invalid"
          YAML

      - name: Bootstrap
        run: scripts/bootstrap

      - name: Syntax checks
        run: |
          export ANSIBLE_CONFIG="$PWD/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/tools.yml --syntax-check
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/shell.yml --syntax-check
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/git.yml --syntax-check

      - name: Install tools
        run: |
          export ANSIBLE_CONFIG="$PWD/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/tools.yml \
            -e '{"dotfiles_manage_packages": true}'

      - name: Render configs in home mode
        run: |
          export ANSIBLE_CONFIG="$PWD/ansible/ansible.cfg"
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/shell.yml \
            -e shell_deploy_mode=home
          ansible-playbook -i ansible/inventory-ci/docker.yml ansible/playbooks/git.yml \
            -e git_deploy_mode=home

      - name: Verify shell integration
        run: scripts/test-shell-integration "$HOME"

  macos-smoke:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Create CI inventory vault replacement
        run: |
          mkdir -p ansible/inventory-ci/group_vars/all
          cp ansible/inventory/local.yml ansible/inventory-ci/local.yml
          cp -R ansible/inventory/group_vars/macos ansible/inventory-ci/group_vars/
          cp -R ansible/inventory/group_vars/ubuntu ansible/inventory-ci/group_vars/
          cp ansible/inventory/group_vars/all/main.yml ansible/inventory-ci/group_vars/all/main.yml
          cat > ansible/inventory-ci/group_vars/all/vault.yml <<'YAML'
          git_user_name: "CI Test User"
          git_user_email: "ci@example.invalid"
          YAML

      - name: Bootstrap
        run: scripts/bootstrap

      - name: Syntax and render checks
        run: |
          export ANSIBLE_CONFIG="$PWD/ansible/ansible.cfg"
          ansible-inventory -i ansible/inventory-ci/local.yml --graph
          ansible-playbook -i ansible/inventory-ci/local.yml ansible/playbooks/shell.yml --syntax-check
          ansible-playbook -i ansible/inventory-ci/local.yml ansible/playbooks/git.yml --syntax-check
          ansible-playbook -i ansible/inventory-ci/local.yml ansible/playbooks/tools.yml --syntax-check
          ansible-playbook -i ansible/inventory-ci/local.yml ansible/playbooks/shell.yml
          ansible-playbook -i ansible/inventory-ci/local.yml ansible/playbooks/git.yml
