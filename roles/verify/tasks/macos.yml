---
- name: Verify macOS document commands
  ansible.builtin.command:
    argv:
      - "{{ verify_shell }}"
      - -lc
      - "{{ item }}"
  loop: "{{ verify_macos_document_command_checks }}"
  changed_when: false

- name: Verify macOS document TeX files are available
  ansible.builtin.command:
    argv:
      - "{{ verify_shell }}"
      - -lc
      - "kpsewhich {{ item }}"
  loop: "{{ verify_macos_document_tex_file_checks }}"
  changed_when: false
