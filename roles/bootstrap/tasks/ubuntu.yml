---
- name: Check Ubuntu Python availability
  ansible.builtin.raw: command -v python3
  register: bootstrap_ubuntu_python_check
  changed_when: false
  failed_when: false

- name: Install Ubuntu Python for Ansible modules
  ansible.builtin.raw: >-
    DEBIAN_FRONTEND=noninteractive apt-get update &&
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
    {{ bootstrap_ubuntu_python_packages | join(' ') }}
  become: true
  changed_when: true
  when: bootstrap_ubuntu_python_check.rc != 0

- name: Gather Ubuntu bootstrap facts
  ansible.builtin.setup:
    gather_subset:
      - min

- name: Verify Ubuntu bootstrap target
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == "Ubuntu"
    fail_msg: "Ubuntu bootstrap only supports Ubuntu targets."

- name: Install Ubuntu stage-0 bootstrap packages
  ansible.builtin.apt:
    name: "{{ bootstrap_ubuntu_stage0_packages }}"
    state: present
    update_cache: true
  become: true
