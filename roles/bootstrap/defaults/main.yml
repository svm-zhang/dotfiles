---
bootstrap_macos_homebrew_pkg_url: "https://github.com/Homebrew/brew/releases/latest/download/Homebrew.pkg"
bootstrap_macos_homebrew_pkg_path: "/tmp/Homebrew.pkg"
bootstrap_macos_homebrew_pkg_user_plist: "/var/tmp/.homebrew_pkg_user"

bootstrap_ubuntu_python_packages:
  - python3
  - python3-apt

bootstrap_ubuntu_stage0_packages:
  - sudo
  - curl
  - wget
  - ca-certificates
  - gnupg
  - software-properties-common
  - python3
  - python3-apt
