---
- name: Check Ubuntu default systemd target
  ansible.builtin.command:
    argv:
      - systemctl
      - get-default
  register: fonts_ubuntu_default_target
  changed_when: false
  failed_when: false

- name: Set Ubuntu graphical profile fact
  ansible.builtin.set_fact:
    fonts_ubuntu_graphical_profile: "{{ fonts_ubuntu_default_target.stdout == 'graphical.target' }}"

- name: Skip Ubuntu user font installation on non-graphical profile
  ansible.builtin.debug:
    msg: "Skipping Ubuntu user font installation because systemd default target is not graphical.target."
  when: not fonts_ubuntu_graphical_profile | bool

- name: Manage Ubuntu desktop user fonts
  when: fonts_ubuntu_graphical_profile | bool
  block:
    - name: Install Ubuntu font prerequisites
      ansible.builtin.apt:
        name:
          - fontconfig
          - unzip
        state: present
        update_cache: true
      become: true

    - name: Manage Ubuntu fonts with Homebrew
      ansible.builtin.include_tasks: brew_casks.yml
      vars:
        fonts_brew_bin: "{{ linuxbrew_default_bin }}"

    - name: Refresh Ubuntu user font cache
      ansible.builtin.command:
        argv:
          - fc-cache
          - -f
      changed_when: true
      when: fonts_brew_casks_to_install | length > 0
