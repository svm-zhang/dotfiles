---
- name: Check conflicting Docker packages
  ansible.builtin.command:
    argv:
      - dpkg-query
      - -W
      - -f=${Status}
      - "{{ item }}"
  loop: "{{ docker_conflicting_packages }}"
  register: docker_conflicting_package_checks
  changed_when: false
  failed_when: false

- name: Set installed conflicting Docker package list
  ansible.builtin.set_fact:
    docker_installed_conflicting_packages: >-
      {{
        docker_conflicting_package_checks.results
        | selectattr('stdout', 'equalto', 'install ok installed')
        | map(attribute='item')
        | list
      }}

- name: Stop when conflicting Docker packages exist and reinstall is disabled
  ansible.builtin.fail:
    msg: >-
      Conflicting Docker packages are installed: {{ docker_installed_conflicting_packages | join(', ') }}.
      Set docker_reinstall=true to remove them before installing Docker Engine from Docker's apt repository.
  when:
    - docker_installed_conflicting_packages | length > 0
    - not docker_reinstall | bool

- name: Remove conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_installed_conflicting_packages }}"
    state: absent
    purge: true
  become: true
  when:
    - docker_installed_conflicting_packages | length > 0
    - docker_reinstall | bool

- name: Install Docker prerequisite packages
  ansible.builtin.apt:
    name: "{{ ubuntu_deb822_prerequisites }}"
    state: present
    update_cache: true
  become: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: "{{ ubuntu_apt_keyring_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Download Docker apt GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_gpg_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    mode: "0644"
  become: true

- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - "{{ docker_apt_uri }}"
    suites:
      - "{{ ubuntu_apt_suite }}"
    components: "{{ docker_apt_components }}"
    architectures:
      - "{{ ubuntu_deb_arch }}"
    signed_by: "{{ docker_apt_keyring_path }}"
    state: present
    mode: "0644"
    install_python_debian: "{{ ubuntu_deb822_install_python_debian }}"
  register: docker_apt_repository
  become: true

- name: Update apt cache after Docker repository change
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: docker_apt_repository.changed

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  become: true

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  become: true
  when:
    - allow_service_actions | bool
    - ansible_facts['service_mgr'] == "systemd"

- name: Add Docker user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  become: true
